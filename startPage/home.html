<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StartPage</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Georgia', 'Times New Roman', Times, serif;
        }

        body {
            background-color: #080808;
            background-image: url('images/background.jpg');
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
            color: #e3ded1;
            line-height: 1.5;
            font-weight: 400;
        }

        .startpage {
            max-width: 1100px;
            width: 100%;
            margin: 2rem auto;
            background-color: rgba(8, 8, 8, .95);
            padding: 2.5rem 2rem;
            border: 2px solid #4a4d32;
            box-shadow: 8px 8px 0 rgba(36, 42, 40, 0.6);
            outline: none;
        }

        .greeting {
            font-size: 2.2rem;
            font-weight: 400;
            letter-spacing: 0.02em;
            margin-bottom: 2rem;
            color: #e3ded1;
            border-left: 6px solid #80581b;
            padding-left: 1.2rem;
            text-transform: lowercase;
            font-variant: small-caps;
            word-spacing: 0.2rem;
        }

        .greeting span {
            color: #927d5e;
            font-style: italic;
            font-weight: normal;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.8rem;
            margin: 2.5rem 0 1rem 0;
        }

        .category-card {
            background-color: #1a1a1a;
            border: 2px solid #311e20;
            padding: 1.5rem 1rem 1.8rem 1.2rem;
            box-shadow: 5px 5px 0px #242a28;
            transition: none;
            outline: none;
        }

        .category-card:focus-within {
            border-color: #927d5e;
            box-shadow: 5px 5px 0px #4a4d32;
            background-color: #1e1c1c;
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: 0.04em;
            color: #e3ded1;
            border-bottom: 1px solid #5b321e;
            padding-bottom: 0.6rem;
            text-transform: uppercase;
            font-size: 1.2rem;
        }

        .card-header span {
            display: none;
        }

        .link-list {
            list-style: none;
        }

        .link-list li {
            margin: 0;
            padding: 0;
            border-bottom: 1px dotted #2a2a2a;
        }

        .link-list li:last-child {
            border-bottom: none;
        }

        .link-list a {
            display: block;
            color: #bdafa0;
            text-decoration: none;
            font-size: 1rem;
            padding: 0.65rem 0.5rem 0.65rem 1rem;
            background-color: transparent;
            border-left: 3px solid transparent;
            transition: none;
            outline: none;
            font-family: 'Courier New', monospace;
            word-break: break-word;
        }

        .link-list a:hover,
        .link-list a:focus {
            background-color: #311e20;
            color: #e3ded1;
            border-left: 3px solid #80581b;
            outline: none;
        }

        .link-list a::before {
            content: "" !important;
            display: none;
        }

        .nav-hint {
            margin-top: 2.5rem;
            text-align: right;
            color: #5b321e;
            border-top: 1px dashed #4a4d32;
            padding-top: 1rem;
            font-size: 0.8rem;
            font-family: monospace;
            text-transform: lowercase;
            letter-spacing: 0.5px;
        }

        .nav-hint kbd {
            background-color: #242a28;
            color: #e3ded1;
            padding: 2px 6px;
            border: 1px solid #5b321e;
            font-family: monospace;
            font-size: 0.75rem;
            margin: 0 2px;
        }

        @media (max-width: 700px) {
            .card-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 1.2rem;
            }
            .startpage {
                padding: 1.5rem;
            }
            .greeting {
                font-size: 1.8rem;
            }
        }

        @media (max-width: 500px) {
            .card-grid {
                grid-template-columns: 1fr;
            }
            body {
                padding: 0.8rem;
            }
        }

        .category-card, .link-list a, .greeting, .startpage {
            transition: none;
            animation: none;
        }

        .link-list a:focus-visible {
            background-color: #311e20;
            color: #e3ded1;
            border-left: 3px solid #927d5e;
            outline: 2px solid #927d5e;
            outline-offset: 1px;
        }

        .category-card:focus-within {
            outline: 2px solid #927d5e;
            outline-offset: 2px;
        }

        ::-webkit-scrollbar {
            width: 8px;
            background: #080808;
        }
        ::-webkit-scrollbar-thumb {
            background: #4a4d32;
            border: 1px solid #242a28;
        }
    </style>
</head>
<body>
    <div class="startpage" id="startpage-root">
        <div class="greeting">
            — <span class="time-greeting">evening</span>, User.
        </div>

        <div class="card-grid">
            <!-- SOCIAL card -->
            <div class="category-card">
                <div class="card-header">
                    SOCIAL
                </div>
                <ul class="link-list">
                    <li><a href="https://discord.com/app" target="_blank" rel="noopener" tabindex="0">discord</a></li>
                    <li><a href="https://youtube.com" target="_blank" rel="noopener" tabindex="0">youtube</a></li>
                    <li><a href="https://twitch.tv" target="_blank" rel="noopener" tabindex="0">twitch</a></li>
                    <li><a href="https://web.whatsapp.com/" target="_blank" rel="noopener" tabindex="0">whatsapp</a></li>
                    <li><a href="https://www.pinterest.com/" target="_blank" rel="noopener" tabindex="0">pinterest</a></li>
                </ul>
            </div>

            <!-- DEV card -->
            <div class="category-card">
                <div class="card-header">
                    DEV
                </div>
                <ul class="link-list">
                    <li><a href="https://github.com" target="_blank" rel="noopener" tabindex="0">github</a></li>
                    <li><a href="https://gemini.google.com/" target="_blank" rel="noopener" tabindex="0">gemini</a></li>
                    <li><a href="https://chat.deepseek.com/" target="_blank" rel="noopener" tabindex="0">deepseek</a></li>
                    <li><a href="link" target="_blank" rel="noopener" tabindex="0">dev</a></li>
                    <li><a href="https://nerdfonts.ytyng.com/" target="_blank" rel="noopener" tabindex="0">nerd fonts</a></li>
                </ul>
            </div>

            <!-- PERSONAL card -->
            <div class="category-card">
                <div class="card-header">
                    PERSONAL
                </div>
                <ul class="link-list">
                    <li><a href="link" target="_blank" rel="noopener" tabindex="0">personal</a></li>
                    <li><a href="https://mail.google.com/mail/u/0/#inbox" target="_blank" rel="noopener" tabindex="0">gmail</a></li>
                    <li><a href="https://mail.proton.me/u/1/inbox" target="_blank" rel="noopener" tabindex="0">proton mail</a></li>
                    <li><a href="https://drive.google.com/" target="_blank" rel="noopener" tabindex="0">google drive</a></li>
                    <li><a href="https://drive.proton.me/" target="_blank" rel="noopener" tabindex="0">proton drive</a></li>
                </ul>
            </div>
        </div>

        <!-- keyboard navigation area / hints -->
        <div class="nav-hint">
            <kbd>Tab</kbd> move · <kbd>Enter</kbd> open · <kbd>Shift+Tab</kbd> back
        </div>
    </div>

    <script>
        (function() {
            // set dynamic greeting based on hour – "morning, afternoon, evening"
            const timeSpan = document.querySelector('.greeting .time-greeting');
            if (timeSpan) {
                const hour = new Date().getHours();
                let timeText = 'night'; // default
                if (hour >= 5 && hour < 12) timeText = 'morning';
                else if (hour >= 12 && hour < 18) timeText = 'afternoon';
                else if (hour >= 18 && hour < 22) timeText = 'evening';
                else timeText = 'night';
                timeSpan.innerText = timeText;
            }
        })();
    </script>
    <!-- ensure background image loads from images/background.jpg -->
</body>
</html>
