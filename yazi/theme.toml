# If the user's terminal is in dark mode, Yazi will load `theme-dark.toml` on startup; otherwise, `theme-light.toml`.
# You can override any parts of them that are not related to the dark/light mode in your own `theme.toml`.

# If you want to dynamically override their content based on dark/light mode, you can specify two different flavors
# for dark and light modes under `[flavor]`, and do so in those flavors instead.
"$schema" = "https://yazi-rs.github.io/schemas/theme.json"

# vim:fileencoding=utf-8:foldmethod=marker

# : Flavor {{{

[flavor]
dark  = ""
light = ""

# : }}}


# : Manager {{{

[mgr]
cwd = { fg = "#e3ded1" }

# Hovered
hovered         = { reversed = true }
preview_hovered = { underline = true }

# Find
find_keyword  = { fg = "#996820", bold = true, italic = true, underline = true }
find_position = { fg = "#aa916d", bg = "reset", bold = true, italic = true }

# Symlink
symlink_target = { italic = true }

# Marker
marker_copied   = { fg = "#626642",  bg = "#626642" }
marker_cut      = { fg = "#753f26",    bg = "#753f26" }
marker_marked   = { fg = "#39423f",   bg = "#39423f" }
marker_selected = { fg = "#996820", bg = "#996820" }

# Count
count_copied   = { fg = "#080808", bg = "#626642" }
count_cut      = { fg = "#080808", bg = "#753f26" }
count_selected = { fg = "#080808", bg = "#996820" }

# Border
border_symbol = "Ôöé"
border_style  = { fg = "#262626" }

# Highlighting
syntect_theme = ""

# : }}}


# : Tabs {{{

[tabs]
active   = { bg = "#080808", bold = true }
inactive = { fg = "#e3ded1", bg = "#262626" }

# Separator
sep_inner = { open = "¯éÂ", close = "¯é┤" }
sep_outer = { open = "¯éÂ", close = "¯é┤" }

# : }}}


# : Mode {{{

[mode]
normal_main = { bg = "#262626", bold = true }
normal_alt  = { fg = "#262626", bg = "#e3ded1" }

# Select mode
select_main = { bg = "#753f26", bold = true }
select_alt  = { fg = "#753f26", bg = "#262626" }

# Unset mode
unset_main = { bg = "#753f26", bold = true }
unset_alt  = { fg = "#753f26", bg = "#262626" }

# : }}}


# : Status bar {{{

[status]
overall   = {}
sep_left  = { open = "¯éÂ", close = "¯é┤" }
sep_right = { open = "¯éÂ", close = "¯é┤" }

# Permissions
perm_sep   = { fg = "#262626" }
perm_type  = { fg = "#626642" }
perm_read  = { fg = "#996820" }
perm_write = { fg = "#753f26" }
perm_exec  = { fg = "#aa916d" }

# Progress
progress_label  = { bold = true }
progress_normal = { fg = "#aa916d", bg = "#262626" }
progress_error  = { fg = "#aa916d", bg = "#753f26" }

# : }}}


# : Which {{{

[which]
cols            = 3
mask            = { bg = "#080808" }
cand            = { fg = "#aa916d" }
rest            = { fg = "#262626" }
desc            = { fg = "#996820" }
separator       = " ¯¬£ "
separator_style = { fg = "#262626" }

# : }}}


# : Confirmation {{{

[confirm]
border     = { fg = "#aa916d" }
title      = { fg = "#aa916d" }
body       = {}
list       = {}
btn_yes    = { reversed = true }
btn_no     = {}
btn_labels = [ "  [Y]es  ", "  (N)o  " ]

# : }}}


# : Spotter {{{

[spot]
border = { fg = "#aa916d" }
title  = { fg = "#aa916d" }

# Table
tbl_col  = { fg = "#aa916d" }
tbl_cell = { fg = "#996820", reversed = true }

# : }}}


# : Notification {{{

[notify]
title_info  = { fg = "#626642" }
title_warn  = { fg = "#996820" }
title_error = { fg = "#753f26" }

# Icons
icon_info  = "´üÜ"
icon_warn  = "´ü▒"
icon_error = "´üù"

# : }}}


# : Picker {{{

[pick]
border   = { fg = "#aa916d" }
active   = { fg = "#996820", bold = true }
inactive = {}

# : }}}


# : Input {{{

[input]
border   = { fg = "#aa916d" }
title    = {}
value    = {}
selected = { reversed = true }

# : }}}


# : Completion {{{

[cmp]
border   = { fg = "#aa916d" }
active   = { reversed = true }
inactive = {}

# Icons
icon_file    = "´àø"
icon_folder  = "´äò"
icon_command = "´Æë"

# : }}}


# : Task manager {{{

[tasks]
border  = { fg = "#aa916d" }
title   = {}
hovered = { fg = "#996820", bold = true }

# : }}}


# : Help menu {{{

[help]
on      = { fg = "#aa916d" }
run     = { fg = "#996820" }
desc    = {}
hovered = { reversed = true, bold = true }
footer  = { fg = "#080808", bg = "#e3ded1" }

# : }}}


# : File-specific styles {{{

[filetype]
rules = [
	# Image
	{ mime = "image/*", fg = "#753f26" },
	# Media
	{ mime = "{audio}/*", fg = "#626642" },
	{ mime = "{video}/*", fg = "#996820" },
	# Archive
	{ mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#492d2f" },
	# Document
	{ mime = "application/pdf", fg = "#5b321e" },
	{ mime = "application/*word*", fg = "#242a28" },
	{ mime = "application/*{presentation,powerpoint}*", fg = "#80581b" },
	{ mime = "application/*{spreadsheet,excel}*", fg = "#4a4d32" },

	# Virtual file system
	{ mime = "vfs/*", fg = "#aa916d" },
	# Special file
	{ url = "*", is = "orphan", bg = "#753f26" },
	{ url = "*", is = "exec"  , fg = "#626642" },
	# Dummy file
	{ url = "*", is = "dummy", bg = "#753f26" },
	{ url = "*/", is = "dummy", bg = "#753f26" },
	# Fallback
	{ url = "*/", fg = "#808080" }
]

# : }}}


